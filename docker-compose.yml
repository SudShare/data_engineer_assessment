version: '3.8'

services:
  # Source Database
  poplin-postgres:
    build:
      context: ./database
      dockerfile: Dockerfile
    container_name: poplin-postgres
    ports:
      - "54325:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: poplin-store
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./seed_data.sql:/docker-entrypoint-initdb.d/seed_data.sql

  # Warehouse (PostgreSQL)
  warehouse-postgres:
    image: postgres:latest
    container_name: warehouse-postgres
    ports:
      - "54326:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: warehouse
    volumes:
      - warehouse_data:/var/lib/postgresql/data

  # Airflow
  airflow:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    container_name: airflow
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:secretpassword@warehouse-postgres:5432/warehouse
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__LOAD_DEFAULT_CONNECTIONS: "false"
    ports:
      - "8080:8080"
    depends_on:
      - warehouse-postgres
      - poplin-postgres
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
    command: >
      bash -c "
      airflow db init &&
      airflow connections add 'source_db' --conn-type 'postgres' --conn-host 'poplin-postgres' --conn-schema 'poplin-store' --conn-login 'postgres' --conn-password 'secretpassword' --conn-port '5432' &&
      airflow connections add 'warehouse_db' --conn-type 'postgres' --conn-host 'warehouse-postgres' --conn-schema 'warehouse' --conn-login 'postgres' --conn-password 'secretpassword' --conn-port '5432' &&
      airflow webserver & airflow scheduler
      "

  # Apache Superset
  superset:
    build:
      context: ./superset
      dockerfile: Dockerfile
    container_name: superset
    ports:
      - "8088:8088"
    environment:
      SUPERSET_ENV: development
      SUPERSET_LOAD_EXAMPLES: "false"
      SUPERSET_SECRET_KEY: 'poplin_secret_key'
    volumes:
      - superset_data:/app/superset_home
    depends_on:
      - warehouse-postgres
    command: >
      bash -c "
      superset db upgrade &&
      superset fab create-admin --username admin --firstname Superset --lastname Admin --email admin@superset.com --password admin &&
      superset init &&
      superset run -h 0.0.0.0 -p 8088
      "

  # dbt
  dbt:
    image: fishtownanalytics/dbt:latest
    container_name: dbt
    volumes:
      - ./dbt:/dbt
    working_dir: /dbt
    entrypoint: ["tail", "-f", "/dev/null"]
    depends_on:
      - warehouse-postgres

volumes:
  postgres_data:
  warehouse_data:
  superset_data:
